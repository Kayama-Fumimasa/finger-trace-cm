<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>指でなぞった距離</title>
  <!-- V5 Japanese fixed: lang=ja, smaller/heavier distance text -->
  <style>
    :root { color-scheme: dark; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #ffffff;
      font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }

    #distance {
      position: fixed;
      top: calc(22px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(16px, 5vw, 26px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.07em;
      font-variant-numeric: tabular-nums;
      color: rgba(255, 255, 255, 0.94);
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <canvas id="stage"></canvas>
  <div id="distance">0.00cm</div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const distanceText = document.getElementById("distance");

    // V5: 複数画面対応 + Apple Pencil の過剰カウント防止。
    // ひとつの平均値ではなく、X方向とY方向を分けてセンチ換算します。
    // iPad / タブレットでの精度を上げ、pointerrawupdate による重複計算も避けます。

    const DEVICE_PROFILES = [
      // 新しい iPhone
      { name: "iPhone 17 Pro Max", type: "iphone", cssW: 440, cssH: 956, physW: 1320, physH: 2868, ppi: 460, dpr: 3 },
      { name: "iPhone Air", type: "iphone", cssW: 420, cssH: 912, physW: 1260, physH: 2736, ppi: 460, dpr: 3 },
      { name: "iPhone 17 / 17 Pro / 16 Pro", type: "iphone", cssW: 402, cssH: 874, physW: 1206, physH: 2622, ppi: 460, dpr: 3 },
      { name: "iPhone 16 Plus / 16 Pro Max / 15 Pro Max / 15 Plus", type: "iphone", cssW: 430, cssH: 932, physW: 1290, physH: 2796, ppi: 460, dpr: 3 },
      { name: "iPhone 14 Plus / 13 Pro Max / 12 Pro Max", type: "iphone", cssW: 428, cssH: 926, physW: 1284, physH: 2778, ppi: 458, dpr: 3 },
      { name: "iPhone 16 / 15 / 15 Pro / 14 Pro", type: "iphone", cssW: 393, cssH: 852, physW: 1179, physH: 2556, ppi: 460, dpr: 3 },
      { name: "iPhone 17e / 16e / 14 / 13 / 12", type: "iphone", cssW: 390, cssH: 844, physW: 1170, physH: 2532, ppi: 460, dpr: 3 },
      { name: "iPhone 13 mini / 12 mini", type: "iphone", cssW: 375, cssH: 812, physW: 1080, physH: 2340, ppi: 476, dpr: 3 },
      { name: "iPhone 11 Pro / XS / X", type: "iphone", cssW: 375, cssH: 812, physW: 1125, physH: 2436, ppi: 458, dpr: 3 },
      { name: "iPhone 11 / XR", type: "iphone", cssW: 414, cssH: 896, physW: 828, physH: 1792, ppi: 326, dpr: 2 },
      { name: "iPhone 8 Plus / 7 Plus / 6 Plus", type: "iphone", cssW: 414, cssH: 736, physW: 1080, physH: 1920, ppi: 401, dpr: 3 },
      { name: "iPhone SE / 8 / 7 / 6", type: "iphone", cssW: 375, cssH: 667, physW: 750, physH: 1334, ppi: 326, dpr: 2 },
      { name: "iPhone SE 1 / 5", type: "iphone", cssW: 320, cssH: 568, physW: 640, physH: 1136, ppi: 326, dpr: 2 },

      // iPad Pro / Air / 標準 iPad。大きい iPad の多くは 264ppi @2x。
      { name: "iPad Pro 13-inch M4 or newer", type: "ipad", cssW: 1032, cssH: 1376, physW: 2064, physH: 2752, ppi: 264, dpr: 2 },
      { name: "iPad Pro 12.9-inch / iPad Air 13-inch", type: "ipad", cssW: 1024, cssH: 1366, physW: 2048, physH: 2732, ppi: 264, dpr: 2 },
      { name: "iPad Pro 11-inch M4 or newer", type: "ipad", cssW: 834, cssH: 1210, physW: 1668, physH: 2420, ppi: 264, dpr: 2 },
      { name: "iPad Pro 11-inch", type: "ipad", cssW: 834, cssH: 1194, physW: 1668, physH: 2388, ppi: 264, dpr: 2 },
      { name: "iPad Pro 10.5-inch / iPad Air 3", type: "ipad", cssW: 834, cssH: 1112, physW: 1668, physH: 2224, ppi: 264, dpr: 2 },
      { name: "iPad 10th/11th gen / iPad Air 11-inch", type: "ipad", cssW: 820, cssH: 1180, physW: 1640, physH: 2360, ppi: 264, dpr: 2 },
      { name: "iPad 10.2-inch", type: "ipad", cssW: 810, cssH: 1080, physW: 1620, physH: 2160, ppi: 264, dpr: 2 },
      { name: "iPad mini 6/7", type: "ipad", cssW: 744, cssH: 1133, physW: 1488, physH: 2266, ppi: 326, dpr: 2 },

      // CSS上のサイズが同じでも、実寸が異なる場合があります。校正や機種情報なしでは原理的に曖昧です。
      { name: "iPad 9.7-inch", type: "ipad", cssW: 768, cssH: 1024, physW: 1536, physH: 2048, ppi: 264, dpr: 2 },
      { name: "iPad mini 2/3/4/5", type: "ipad", cssW: 768, cssH: 1024, physW: 1536, physH: 2048, ppi: 326, dpr: 2 }
    ];

    let drawing = false;
    let lastPoint = null;
    let filteredPoint = null;
    let totalCm = 0;
    let activePointerId = null;
    let activePointerType = "touch";
    let estimate = estimateScale();

    function round2(n) {
      return Math.round(n * 100) / 100;
    }

    function median(values) {
      const sorted = [...values].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function scaleFromProfile(profile) {
      const widthCm = profile.physW / profile.ppi * 2.54;
      const heightCm = profile.physH / profile.ppi * 2.54;
      return {
        cmPerCssX: widthCm / profile.cssW,
        cmPerCssY: heightCm / profile.cssH
      };
    }

    function averageScale(scales) {
      return {
        cmPerCssX: median(scales.map(s => s.cmPerCssX)),
        cmPerCssY: median(scales.map(s => s.cmPerCssY))
      };
    }

    function getScreenSignature() {
      const sw = Math.round(window.screen.width || window.innerWidth);
      const sh = Math.round(window.screen.height || window.innerHeight);
      return {
        cssW: Math.min(sw, sh),
        cssH: Math.max(sw, sh),
        dpr: round2(window.devicePixelRatio || 1)
      };
    }

    function getDeviceHints(cssW) {
      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      const maxTouchPoints = navigator.maxTouchPoints || 0;
      const iOSLike = /iPhone|iPad|iPod/.test(ua) || (platform === "MacIntel" && maxTouchPoints > 1);
      const iPhoneLike = /iPhone/.test(ua) || (iOSLike && cssW < 600);
      const iPadLike = /iPad/.test(ua) || (platform === "MacIntel" && maxTouchPoints > 1 && cssW >= 600);
      const androidLike = /Android/.test(ua);
      const tabletLike = iPadLike || cssW >= 600;
      return { iOSLike, iPhoneLike, iPadLike, androidLike, tabletLike };
    }

    function scoreProfile(profile, cssW, cssH, dpr) {
      return Math.abs(profile.cssW - cssW) + Math.abs(profile.cssH - cssH) + Math.abs(profile.dpr - dpr) * 120;
    }

    function estimateScale() {
      const { cssW, cssH, dpr } = getScreenSignature();
      const hints = getDeviceHints(cssW);

      let profiles = DEVICE_PROFILES;
      if (hints.iPadLike) profiles = DEVICE_PROFILES.filter(p => p.type === "ipad");
      else if (hints.iPhoneLike) profiles = DEVICE_PROFILES.filter(p => p.type === "iphone");

      const exact = profiles.filter(p =>
        Math.abs(p.cssW - cssW) <= 2 &&
        Math.abs(p.cssH - cssH) <= 2 &&
        Math.abs(p.dpr - dpr) < 0.15
      );

      if (exact.length > 0) {
        const scale = averageScale(exact.map(scaleFromProfile));
        return {
          ...scale,
          method: exact.length === 1 ? "exact-profile" : "ambiguous-profile",
          confidence: exact.length === 1 ? "high" : "medium",
          matches: exact.map(p => p.name),
          cssW, cssH, dpr
        };
      }

      if (hints.iOSLike) {
        let best = profiles[0];
        let bestScore = Infinity;
        for (const p of profiles) {
          const score = scoreProfile(p, cssW, cssH, dpr);
          if (score < bestScore) {
            best = p;
            bestScore = score;
          }
        }
        const scale = scaleFromProfile(best);
        return {
          ...scale,
          method: "nearest-ios-profile",
          confidence: bestScore < 16 ? "medium" : "low",
          matches: [best.name],
          cssW, cssH, dpr,
          score: bestScore
        };
      }

      // Android / その他タブレット向けの汎用フォールバック。
      // スマートフォンは高密度、タブレットは 220〜280ppi に近いことが多いです。
      const assumedPpi = hints.tabletLike ? 264 : (dpr >= 3 ? 440 : dpr >= 2 ? 326 : 160);
      const cmPerCss = dpr / assumedPpi * 2.54;
      return {
        cmPerCssX: cmPerCss,
        cmPerCssY: cmPerCss,
        method: hints.tabletLike ? "generic-tablet-fallback" : "generic-phone-fallback",
        confidence: "low",
        matches: [],
        cssW, cssH, dpr
      };
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      clearCanvas(false);
      estimate = estimateScale();
      window.__touchTraceEstimate = estimate;
      console.log("指でなぞった距離 V5 推定値", estimate);
    }

    function clearCanvas(resetNumber = true) {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      if (resetNumber) {
        totalCm = 0;
        updateNumber();
      }
    }

    function pointFromEvent(event) {
      return { x: event.clientX, y: event.clientY };
    }

    function drawSegment(from, to) {
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
      ctx.lineWidth = 20;
      ctx.shadowColor = "rgba(255, 255, 255, 0.23)";
      ctx.shadowBlur = 26;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.90)";
      ctx.lineWidth = 5.5;
      ctx.shadowBlur = 0;
      ctx.stroke();

      ctx.restore();
    }

    function updateNumber() {
      distanceText.textContent = `${totalCm.toFixed(2)}cm`;
    }

    function filteredPointForPen(rawPoint) {
      // Apple Pencil は指より敏感で、小さな手ブレも拾いやすいです。
      // 軽いローパスフィルターで見た目を保ちつつ、ノイズによる距離の増加を抑えます。
      if (activePointerType !== "pen") return rawPoint;
      if (!filteredPoint) {
        filteredPoint = rawPoint;
        return rawPoint;
      }
      const alpha = 0.72;
      filteredPoint = {
        x: filteredPoint.x + (rawPoint.x - filteredPoint.x) * alpha,
        y: filteredPoint.y + (rawPoint.y - filteredPoint.y) * alpha
      };
      return filteredPoint;
    }

    function addPoint(rawPoint) {
      const currentPoint = filteredPointForPen(rawPoint);

      if (!lastPoint) {
        lastPoint = currentPoint;
        return;
      }

      const dx = currentPoint.x - lastPoint.x;
      const dy = currentPoint.y - lastPoint.y;
      const distanceCss = Math.hypot(dx, dy);

      // ペンのイベントは高頻度で、微細な揺れを含むことがあります。
      // 少し大きめのしきい値で、手ブレを距離として数えにくくします。
      const minStepCss = activePointerType === "pen" ? 1.15 : 0.45;
      if (distanceCss < minStepCss) return;

      const segmentCm = Math.hypot(
        dx * estimate.cmPerCssX,
        dy * estimate.cmPerCssY
      );

      totalCm += segmentCm;
      drawSegment(lastPoint, currentPoint);
      lastPoint = currentPoint;
    }

    function eventsForDistance(event) {
      // iPadOS の Apple Pencil は高密度な coalesced event を返すことがあります。
      // 距離計測では同じ動きを過剰に数える可能性があるため、ペンでは通常イベントのみを使います。
      if (event.pointerType === "pen") return [event];

      if (typeof event.getCoalescedEvents === "function") {
        const events = event.getCoalescedEvents();
        if (events && events.length) return events;
      }
      return [event];
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (!event.isPrimary) return;
      event.preventDefault();
      activePointerId = event.pointerId;
      activePointerType = event.pointerType || "touch";
      canvas.setPointerCapture(activePointerId);
      drawing = true;
      totalCm = 0;
      lastPoint = pointFromEvent(event);
      filteredPoint = lastPoint;
      clearCanvas(false);
      updateNumber();
    }, { passive: false });

    canvas.addEventListener("pointermove", (event) => {
      if (!drawing || event.pointerId !== activePointerId) return;
      event.preventDefault();
      for (const e of eventsForDistance(event)) {
        addPoint(pointFromEvent(e));
      }
      updateNumber();
    }, { passive: false });

    function finishDrawing(event) {
      if (!drawing || event.pointerId !== activePointerId) return;
      event.preventDefault();
      drawing = false;
      activePointerId = null;
      filteredPoint = null;
    }

    canvas.addEventListener("pointerup", finishDrawing, { passive: false });
    canvas.addEventListener("pointercancel", finishDrawing, { passive: false });

    window.addEventListener("resize", resizeCanvas);
    window.visualViewport?.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 120));

    resizeCanvas();
    updateNumber();
  </script>
</body>
</html>
