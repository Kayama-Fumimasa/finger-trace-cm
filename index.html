<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Touch Trace CM</title>
  <style>
    :root { color-scheme: dark; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #ffffff;
      font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }

    #distance {
      position: fixed;
      top: calc(22px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(22px, 6.2vw, 38px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.015em;
      font-variant-numeric: tabular-nums;
      color: rgba(255, 255, 255, 0.94);
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <canvas id="stage"></canvas>
  <div id="distance">0.00cm</div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const distanceText = document.getElementById("distance");

    // Device table: logical CSS size in portrait, actual physical pixels, PPI.
    // This keeps the more accurate iPhone estimation from V2, but hides all diagnostic text.
    const IOS_DEVICES = [
      { name: "iPhone 16 Pro Max / 15 Pro Max / 15 Plus / 14 Pro Max", cssW: 430, cssH: 932, physW: 1290, physH: 2796, ppi: 460, dpr: 3 },
      { name: "iPhone 16 Plus / 14 Plus / 13 Pro Max / 12 Pro Max", cssW: 428, cssH: 926, physW: 1284, physH: 2778, ppi: 458, dpr: 3 },
      { name: "iPhone 16 Pro / 16 / 15 Pro / 15 / 14 Pro", cssW: 393, cssH: 852, physW: 1179, physH: 2556, ppi: 460, dpr: 3 },
      { name: "iPhone 16e / 14 / 13 / 13 Pro / 12 / 12 Pro", cssW: 390, cssH: 844, physW: 1170, physH: 2532, ppi: 460, dpr: 3 },
      { name: "iPhone 13 mini / 12 mini", cssW: 375, cssH: 812, physW: 1080, physH: 2340, ppi: 476, dpr: 3 },
      { name: "iPhone 11 Pro / XS / X", cssW: 375, cssH: 812, physW: 1125, physH: 2436, ppi: 458, dpr: 3 },
      { name: "iPhone 11 / XR", cssW: 414, cssH: 896, physW: 828, physH: 1792, ppi: 326, dpr: 2 },
      { name: "iPhone 8 Plus / 7 Plus / 6s Plus / 6 Plus", cssW: 414, cssH: 736, physW: 1080, physH: 1920, ppi: 401, dpr: 3 },
      { name: "iPhone SE 3 / SE 2 / 8 / 7 / 6s / 6", cssW: 375, cssH: 667, physW: 750, physH: 1334, ppi: 326, dpr: 2 },
      { name: "iPhone SE 1 / 5s / 5", cssW: 320, cssH: 568, physW: 640, physH: 1136, ppi: 326, dpr: 2 }
    ];

    let drawing = false;
    let lastPoint = null;
    let totalCssPx = 0;
    let activePointerId = null;
    let estimate = estimateCmPerCssPx();

    function round2(n) {
      return Math.round(n * 100) / 100;
    }

    function cmPerCssPxFromDevice(device) {
      const widthCm = device.physW / device.ppi * 2.54;
      const heightCm = device.physH / device.ppi * 2.54;
      const byWidth = widthCm / device.cssW;
      const byHeight = heightCm / device.cssH;
      return (byWidth + byHeight) / 2;
    }

    function median(values) {
      const sorted = [...values].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function estimateCmPerCssPx() {
      const sw = Math.round(window.screen.width);
      const sh = Math.round(window.screen.height);
      const cssW = Math.min(sw, sh);
      const cssH = Math.max(sw, sh);
      const dpr = round2(window.devicePixelRatio || 1);
      const ua = navigator.userAgent || "";
      const isLikelyIPhone = /iPhone/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1 && cssW < 600);

      const exact = IOS_DEVICES.filter(d =>
        d.cssW === cssW &&
        d.cssH === cssH &&
        Math.abs(d.dpr - dpr) < 0.15
      );

      if (exact.length > 0) {
        return {
          cmPerCssPx: median(exact.map(cmPerCssPxFromDevice)),
          method: exact.length === 1 ? "exact-device-signature" : "ambiguous-device-signature",
          confidence: exact.length === 1 ? "high" : "medium",
          cssW, cssH, dpr
        };
      }

      if (isLikelyIPhone) {
        let best = IOS_DEVICES[0];
        let bestScore = Infinity;
        for (const d of IOS_DEVICES) {
          const score = Math.abs(d.cssW - cssW) + Math.abs(d.cssH - cssH) + Math.abs(d.dpr - dpr) * 100;
          if (score < bestScore) {
            best = d;
            bestScore = score;
          }
        }
        return {
          cmPerCssPx: cmPerCssPxFromDevice(best),
          method: "nearest-iphone-signature",
          confidence: bestScore < 8 ? "medium" : "low",
          cssW, cssH, dpr
        };
      }

      const assumedPpi = dpr >= 3 ? 460 : 326;
      return {
        cmPerCssPx: dpr / assumedPpi * 2.54,
        method: "generic-dpr-ppi-fallback",
        confidence: "low",
        cssW, cssH, dpr
      };
    }

    function cssPxToCm(px) {
      return px * estimate.cmPerCssPx;
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      clearCanvas(false);
      estimate = estimateCmPerCssPx();
      console.log("touch-trace-cm estimate", estimate);
    }

    function clearCanvas(resetNumber = true) {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      if (resetNumber) {
        totalCssPx = 0;
        updateNumber();
      }
    }

    function pointFromEvent(event) {
      return { x: event.clientX, y: event.clientY, t: event.timeStamp };
    }

    function drawSegment(from, to) {
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
      ctx.lineWidth = 20;
      ctx.shadowColor = "rgba(255, 255, 255, 0.23)";
      ctx.shadowBlur = 26;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.90)";
      ctx.lineWidth = 5.5;
      ctx.shadowBlur = 0;
      ctx.stroke();

      ctx.restore();
    }

    function updateNumber() {
      const cm = cssPxToCm(totalCssPx);
      distanceText.textContent = `${cm.toFixed(2)}cm`;
      // If you prefer one decimal place, use this instead:
    }

    function addPoint(currentPoint) {
      if (!lastPoint) {
        lastPoint = currentPoint;
        return;
      }
      const dx = currentPoint.x - lastPoint.x;
      const dy = currentPoint.y - lastPoint.y;
      const distance = Math.hypot(dx, dy);
      if (distance < 0.25) return;
      totalCssPx += distance;
      drawSegment(lastPoint, currentPoint);
      lastPoint = currentPoint;
    }

    function coalescedEvents(event) {
      if (typeof event.getCoalescedEvents === "function") {
        const events = event.getCoalescedEvents();
        if (events && events.length) return events;
      }
      return [event];
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (!event.isPrimary) return;
      event.preventDefault();
      activePointerId = event.pointerId;
      canvas.setPointerCapture(activePointerId);
      drawing = true;
      totalCssPx = 0;
      lastPoint = pointFromEvent(event);
      clearCanvas(false);
      updateNumber();
    }, { passive: false });

    function handlePointerMove(event) {
      if (!drawing || event.pointerId !== activePointerId) return;
      event.preventDefault();
      for (const e of coalescedEvents(event)) {
        addPoint(pointFromEvent(e));
      }
      updateNumber();
    }

    canvas.addEventListener("pointermove", handlePointerMove, { passive: false });
    if ("onpointerrawupdate" in window) {
      canvas.addEventListener("pointerrawupdate", handlePointerMove, { passive: false });
    }

    function finishDrawing(event) {
      if (!drawing || event.pointerId !== activePointerId) return;
      event.preventDefault();
      drawing = false;
      activePointerId = null;
    }

    canvas.addEventListener("pointerup", finishDrawing, { passive: false });
    canvas.addEventListener("pointercancel", finishDrawing, { passive: false });

    window.addEventListener("resize", resizeCanvas);
    window.visualViewport?.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    updateNumber();
  </script>
</body>
</html>
